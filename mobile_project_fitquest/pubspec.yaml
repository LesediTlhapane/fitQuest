name: fitquest
description: FitQuest - your fitness journey awaits
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase - WEB COMPATIBLE VERSIONS
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Maps - flutter_map for cross-platform mapping
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  
  # Location services - updated versions
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Database - Hive works on web and mobile
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  path: ^1.9.0
  intl: ^0.20.2
  image_picker: ^1.1.0
  cached_network_image: ^3.3.0
  
  # HTTP for network requests (useful for maps)
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # For Hive code generation (optional but recommended)
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/Image.jpg