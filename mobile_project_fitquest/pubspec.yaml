name: fitquest
description: FitQuest - your fitness journey awaits
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase - WEB COMPATIBLE VERSIONS
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Maps - flutter_map for cross-platform mapping
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  
  # Location services
  geolocator: ^11.0.0
  
  # Connectivity
  connectivity_plus: ^5.0.0

  # Storage - shared_preferences works on web AND mobile
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.20.2
  
  # UI components
  cached_network_image: ^3.3.0
  syncfusion_flutter_charts: ^31.2.16
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/Image.jpg