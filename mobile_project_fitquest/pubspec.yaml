name: fitquest
description: FitQuest - your fitness journey awaits
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"   # REQUIRED for latest Firebase + JS interop

dependencies:
  flutter:
    sdk: flutter

  # state management
  provider: ^6.1.2

  # --- Firebase (latest stable, required for modern JS interop) ---
  firebase_core: ^3.8.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.4.4

  # local DB
  sqflite: ^2.3.3
  path_provider: ^2.1.2
  path: ^1.9.0

  # maps & location
  geolocator: ^10.1.0
  google_maps_flutter: ^2.7.1

  # utilities
  uuid: ^4.4.0
  location: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

